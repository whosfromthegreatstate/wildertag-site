<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Password — Wildertag</title>
    <meta name="description" content="Reset your Wildertag password." />
    <style>
      :root {
        --bg: #0a0a0a;
        --panel: #111;
        --fg: #e9e0cf;
        --muted: #8a8170;
        --green: #22c55e;
        --green-dark: #16a34a;
        --border: #2a2520;
        --error: #ef4444;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        line-height: 1.6;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 2.5rem 2rem;
        width: 100%;
        max-width: 24rem;
      }
      .logo {
        width: 56px;
        height: 56px;
        background: var(--green);
        border-radius: 50%;
        margin: 0 auto 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 30px rgba(34, 197, 94, 0.4);
      }
      .logo svg { width: 28px; height: 28px; }
      h1 {
        text-align: center;
        font-size: 1.5rem;
        font-weight: 800;
        margin-bottom: 0.25rem;
        letter-spacing: -0.02em;
      }
      .subtitle {
        text-align: center;
        color: var(--muted);
        font-size: 0.875rem;
        margin-bottom: 2rem;
      }
      label {
        display: block;
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.5rem;
        margin-top: 1rem;
      }
      input {
        width: 100%;
        padding: 0.75rem 1rem;
        background: #1a1a1a;
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        color: var(--fg);
        font-size: 1rem;
        font-family: inherit;
        transition: border-color 0.2s;
      }
      input:focus {
        outline: none;
        border-color: var(--green);
      }
      button {
        width: 100%;
        padding: 0.85rem;
        margin-top: 1.5rem;
        background: var(--green);
        color: #000;
        border: none;
        border-radius: 0.5rem;
        font-size: 1rem;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
      }
      button:hover:not(:disabled) { background: var(--green-dark); }
      button:active:not(:disabled) { transform: scale(0.98); }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .message {
        margin-top: 1rem;
        padding: 0.75rem;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        text-align: center;
      }
      .message.error { background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid rgba(239, 68, 68, 0.3); }
      .message.success { background: rgba(34, 197, 94, 0.1); color: var(--green); border: 1px solid rgba(34, 197, 94, 0.3); }
      .footer-link {
        display: block;
        text-align: center;
        margin-top: 1.5rem;
        color: var(--muted);
        font-size: 0.85rem;
        text-decoration: none;
      }
      .footer-link:hover { color: var(--green); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
      </div>
      <h1>Reset Your Password</h1>
      <p class="subtitle">Enter a new password for your Wildertag account.</p>

      <form id="resetForm">
        <label for="password">New Password</label>
        <input type="password" id="password" minlength="6" required autocomplete="new-password" />
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" minlength="6" required autocomplete="new-password" />
        <button type="submit" id="submitBtn">Set New Password</button>
        <div id="message"></div>
      </form>

      <a href="/" class="footer-link">← Back to Wildertag</a>
    </div>

    <script type="module">
      import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

      const SUPABASE_URL = 'https://ihecdyywhzxszskpoksg.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImloZWNkeXl3aHp4c3pza3Bva3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDgzNzEsImV4cCI6MjA4OTc4NDM3MX0.cncbzJMNKs0766naGpzFx68dVSAR3yIQybwTpc-Hnq8';

      const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const form = document.getElementById('resetForm');
      const messageEl = document.getElementById('message');
      const submitBtn = document.getElementById('submitBtn');

      function showMessage(text, type) {
        messageEl.textContent = text;
        messageEl.className = 'message ' + type;
      }

      // Supabase puts recovery tokens in the URL hash. The SDK auto-parses them
      // on load and establishes a session, which lets us call updateUser().
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        // Try to read from hash manually as a fallback
        const hash = new URLSearchParams(window.location.hash.substring(1));
        const accessToken = hash.get('access_token');
        const refreshToken = hash.get('refresh_token');
        if (accessToken && refreshToken) {
          await supabase.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
        } else {
          showMessage('Reset link is invalid or has expired. Request a new one from the app.', 'error');
          submitBtn.disabled = true;
        }
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm').value;

        if (password !== confirm) {
          showMessage('Passwords do not match.', 'error');
          return;
        }
        if (password.length < 6) {
          showMessage('Password must be at least 6 characters.', 'error');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Updating...';
        showMessage('', '');

        const { error } = await supabase.auth.updateUser({ password });

        if (error) {
          showMessage(error.message, 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Set New Password';
        } else {
          showMessage('Password updated! You can now sign in to the Wildertag app with your new password.', 'success');
          submitBtn.textContent = 'Done';
          form.querySelectorAll('input').forEach(i => i.disabled = true);
        }
      });
    </script>
  </body>
</html>
